---
all:
  children:
    minecraft_servers:
      hosts:
        minecraft-01:
          ansible_host: 203.0.113.10
          ansible_user: ubuntu

          # Set this to "TRUE" only after reading and accepting the Minecraft EULA:
          # https://aka.ms/MinecraftEULA
          minecraft_eula: "TRUE"

          minecraft_name: minecraft
          minecraft_port: 25565
          minecraft_type: VANILLA
          minecraft_version: LATEST
          minecraft_memory: 4G
          minecraft_motd: "An Ansible managed Minecraft server"
          minecraft_difficulty: normal
          minecraft_max_players: 20
          minecraft_mod_mode: none

          # Optional examples:
          # Run Fabric instead of vanilla:
          # minecraft_type: FABRIC
          # minecraft_version: "1.21.6"
          # minecraft_fabric_loader_version: "0.16.14"
          # minecraft_fabric_launcher_version: "1.0.3"
          #
          # Sync existing Minecraft server data from this local repo machine to
          # the remote server before starting the container. Example:
          # minecraft_local_data_dir: ./minecraft-data
          # Pull remote server data back to the same local directory with:
          # make pull-data
          # This requires key-based SSH and passwordless sudo for rsync.
          # minecraft_remote_snapshot_dir: /opt/docker/minecraft-vanilla/sync-snapshot
          # minecraft_pull_cleanup_snapshot: true
          # minecraft_local_data_delete: false
          #
          # Mod modes:
          # - none: use mods already present in /data, such as files synced
          #   from ./minecraft-data/mods
          # - urls: set minecraft_mod_urls to direct jar URLs or container paths
          # - urls_file: set minecraft_mods_file to a text file URL or a
          #   container path such as /data/mods.txt
          # - modrinth: set minecraft_modrinth_projects to Modrinth slugs/IDs
          # - curseforge: set minecraft_curseforge_files and a CurseForge API key
          #
          # minecraft_type: FABRIC
          # minecraft_mod_mode: modrinth
          # minecraft_modrinth_projects: |
          #   fabric-api
          #   lithium
          # minecraft_ops: "your_minecraft_username"
          # minecraft_enable_whitelist: "TRUE"
          # minecraft_whitelist: "player_one,player_two"
          # minecraft_online_mode: "FALSE"
          # minecraft_rcon_password: "change-this-password"
