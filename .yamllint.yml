---
extends: default

ignore: |
  .venv/
  playbooks/templates/*.j2

rules:
  braces:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  document-start:
    present: true
  line-length:
    max: 100
    level: warning
  octal-values:
    forbid-explicit-octal: true
    forbid-implicit-octal: true
