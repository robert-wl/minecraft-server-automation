---
- name: Restart Minecraft server
  hosts: minecraft_servers
  become: true

  vars:
    minecraft_dir: /opt/docker/minecraft-vanilla
    minecraft_compose_file: "{{ minecraft_dir }}/compose.yml"

  pre_tasks:
    - name: Check Minecraft Compose file
      ansible.builtin.stat:
        path: "{{ minecraft_compose_file }}"
      register: minecraft_compose

    - name: Require deployed Minecraft stack
      ansible.builtin.assert:
        that:
          - minecraft_compose.stat.exists
        fail_msg: "No Compose file found at {{ minecraft_compose_file }}. Run the deploy playbook first."

  tasks:
    - name: Restart Minecraft stack
      community.docker.docker_compose_v2:
        project_src: "{{ minecraft_dir }}"
        state: restarted
