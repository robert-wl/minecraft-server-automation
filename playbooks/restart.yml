---
- name: Restart Minecraft server
  hosts: minecraft_servers
  become: true

  pre_tasks:
    - name: Check Minecraft Compose file
      ansible.builtin.stat:
        path: "{{ minecraft_compose_file }}"
      register: minecraft_compose

    - name: Require deployed Minecraft stack
      ansible.builtin.assert:
        that:
          - minecraft_compose.stat.exists
        fail_msg: >-
          No Compose file found at {{ minecraft_compose_file }}.
          Run the deploy playbook first.

  tasks:
    - name: Restart Minecraft stack
      community.docker.docker_compose_v2:
        project_src: "{{ minecraft_dir }}"
        state: restarted
