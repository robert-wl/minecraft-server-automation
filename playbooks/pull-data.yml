---
- name: Pull Minecraft server data to local machine
  hosts: minecraft_servers
  become: true

  pre_tasks:
    - name: Require Ubuntu or Debian target
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: This playbook currently supports Ubuntu/Debian targets.

    - name: Normalize Minecraft data paths
      ansible.builtin.set_fact:
        minecraft_pull_local_data_dir: >-
          {{ minecraft_local_data_dir
             if minecraft_local_data_dir | length > 0
             else './minecraft-data' }}
        minecraft_data_dir_normalized: >-
          {{ minecraft_data_dir | regex_replace('/+$', '') }}
        minecraft_remote_snapshot_dir_normalized: >-
          {{ minecraft_remote_snapshot_dir | regex_replace('/+$', '') }}

    - name: Require snapshot directory outside live data directory
      ansible.builtin.assert:
        that:
          - minecraft_remote_snapshot_dir_normalized != minecraft_data_dir_normalized
          - >-
            not minecraft_remote_snapshot_dir_normalized.startswith(
              minecraft_data_dir_normalized ~ '/'
            )
        fail_msg: >-
          minecraft_remote_snapshot_dir must not be inside minecraft_data_dir.
          Use a sibling path such as {{ minecraft_dir }}/sync-snapshot.

    - name: Check Minecraft Compose file
      ansible.builtin.stat:
        path: "{{ minecraft_compose_file }}"
      register: minecraft_compose

    - name: Require deployed Minecraft stack
      ansible.builtin.assert:
        that:
          - minecraft_compose.stat.exists
        fail_msg: >-
          No Compose file found at {{ minecraft_compose_file }}.
          Run the deploy playbook first.

    - name: Check Minecraft data directory
      ansible.builtin.stat:
        path: "{{ minecraft_data_dir_normalized }}"
      register: minecraft_data

    - name: Require Minecraft data directory
      ansible.builtin.assert:
        that:
          - minecraft_data.stat.isdir
        fail_msg: >-
          No Minecraft data directory found at {{ minecraft_data_dir }}.
          Run the deploy playbook first.

    - name: Install rsync
      ansible.builtin.apt:
        name: rsync
        state: present
        update_cache: true

    - name: Create local Minecraft data directory
      ansible.builtin.file:
        path: "{{ minecraft_pull_local_data_dir }}"
        state: directory
        mode: "0755"
      become: false
      delegate_to: localhost

  tasks:
    - name: Snapshot remote Minecraft data
      block:
        - name: Stop Minecraft before remote snapshot
          community.docker.docker_compose_v2:
            project_src: "{{ minecraft_dir }}"
            state: absent
          when: minecraft_pull_stop_server | bool

        - name: Remove previous remote snapshot
          ansible.builtin.file:
            path: "{{ minecraft_remote_snapshot_dir_normalized }}"
            state: absent

        - name: Copy remote live data to remote snapshot
          ansible.posix.synchronize:
            src: "{{ minecraft_data_dir_normalized }}/"
            dest: "{{ minecraft_remote_snapshot_dir_normalized }}/"
            archive: true
            delete: true
          delegate_to: "{{ inventory_hostname }}"

      always:
        - name: Start Minecraft after remote snapshot
          community.docker.docker_compose_v2:
            project_src: "{{ minecraft_dir }}"
            pull: never
            state: present
          when: minecraft_pull_stop_server | bool

    - name: Pull remote snapshot to local data directory
      ansible.posix.synchronize:
        mode: pull
        src: "{{ minecraft_remote_snapshot_dir_normalized }}/"
        dest: "{{ minecraft_pull_local_data_dir | regex_replace('/+$', '') }}/"
        archive: true
        delete: "{{ minecraft_local_data_delete | bool }}"
        rsync_path: "sudo rsync"
        rsync_opts:
          - "--exclude=.gitkeep"

    - name: Remove remote snapshot after successful pull
      ansible.builtin.file:
        path: "{{ minecraft_remote_snapshot_dir_normalized }}"
        state: absent
      when: minecraft_pull_cleanup_snapshot | bool
